version: "3.9"

services:
  cert-init:
    image: docker.m.daocloud.io/alpine:3.19
    container_name: minicpm-cert-init
    restart: "no"
    command: >
      sh -c "apk add --no-cache openssl &&
      mkdir -p /ssl &&
      if [ ! -f /ssl/fullchain.pem ] || [ ! -f /ssl/privkey.pem ]; then
        openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /ssl/privkey.pem -out /ssl/fullchain.pem -subj '/C=CN/ST=BJ/L=BJ/O=MiniCPM/OU=AI/CN=10.100.15.95';
      else
        echo 'SSL cert already exists, skip.';
      fi"
    volumes:
      - /opt/tpapp/software/models/MiniCPM_docker/nginx/ssl:/ssl

  minicpm-o-demo:
    image: minicpm-o:latest
    container_name: minicpm-o-demo
    restart: unless-stopped
    runtime: nvidia
    environment:
      CUDA_VISIBLE_DEVICES: "5"
      NUM_GPUS_OVERRIDE: "1"
    ports:
      - "8106:8006"
    volumes:
      - /opt/tpapp/software/models/MiniCPM_docker:/workspace
    expose:
      - "8006"
    networks:
      - minicpm-net

  nginx:
    image: docker.m.daocloud.io/nginx:stable
    container_name: minicpm-nginx
    restart: unless-stopped
    depends_on:
      cert-init:
        condition: service_completed_successfully
      minicpm-o-demo:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/tpapp/software/models/MiniCPM_docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/tpapp/software/models/MiniCPM_docker/nginx/ssl:/etc/nginx/ssl
      - /opt/tpapp/software/models/MiniCPM_docker/nginx/logs:/var/log/nginx
    networks:
      - minicpm-net

networks:
  minicpm-net:
    driver: bridge
